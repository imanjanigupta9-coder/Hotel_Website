<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/static/css/style.css">
  <title>Pages</title>
</head>
<body>
  <main class="max-w-6xl mx-auto px-6 py-12">
    <h1 class="font-serif text-3xl mb-4">Site Pages</h1>
    <ul class="space-y-3">
      {% for p in pages %}
      <li class="glass-card p-4">
        <a href="{{ p.link }}" class="font-semibold text-lg">{{ p.title }}</a>
        <p class="text-sm text-neutral-600">{{ p.summary }}</p>
      </li>
      {% endfor %}
    </ul>
  </main>
</body>
</html>
