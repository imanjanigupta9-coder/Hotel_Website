<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/static/css/style.css">
  <title>Rooms</title>
</head>
<body>
  <main class="max-w-6xl mx-auto px-6 py-12">
    <h1 class="font-serif text-3xl mb-4">Our Rooms</h1>
    <div class="grid gap-6 md:grid-cols-2">
      {% for room in rooms %}
      <article class="glass-card p-4 flex gap-4 items-start">
        <img src="{{ room.img }}" alt="{{ room.name }}" class="w-40 h-auto object-cover" />
        <div>
          <h3 class="font-semibold">{{ room.name }}</h3>
          <p class="text-sm text-neutral-600">{{ room.description }}</p>
        </div>
      </article>
      {% endfor %}
    </div>
  </main>
</body>
</html>
